service: smart-study-backend
frameworkVersion: "3"

plugins:
  - serverless-offline

custom:
  studentId: "inhatc-202647019"
  prefix: "smartstudy"
  usersTableName: "${self:custom.prefix}-Users"
  serversTableName: "${self:custom.prefix}-Servers"
  connectionsTableName: "${self:custom.prefix}-Connections"
  messagesTableName: "${self:custom.prefix}-Messages"
  refreshTokensTableName: "${self:custom.prefix}-RefreshTokens"
  serverMembersTableName: "${self:custom.prefix}-ServerMembers"

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  stage: dev
  role: arn:aws:iam::269578498605:role/SafeRole-inhatc-team3
  deploymentBucket:
    name: inhatc-team3-2-deployments

  environment:
    REGION: us-east-1
    # 로컬 환경이 아닐 경우
    JWT_SECRET_KEY:    ${ssm:/smartstudy/dev/jwt-secret-key}
    SALT:              ${ssm:/smartstudy/dev/salt}
    HASHING_ALGORITHM: HS256
    S3_BUCKET: ${env:S3_BUCKET, ""}
    ALLOWED_ORIGIN: ${env:ALLOWED_ORIGIN, "https://your-cloudfront-domain.net"}
    RESOURCES_BUCKET: "inhatc-team3-2-resources"
    # 테이블명 환경변수
    USERS_TABLE: ${self:custom.usersTableName}
    SERVERS_TABLE: ${self:custom.serversTableName}
    CONNECTIONS_TABLE: ${self:custom.connectionsTableName}
    MESSAGES_TABLE: ${self:custom.messagesTableName}
    REFRESH_TOKENS_TABLE: ${self:custom.refreshTokensTableName}
    SERVER_MEMBERS_TABLE: ${self:custom.serverMembersTableName}

# -------------------------------------------------------
# Lambda 함수 목록
# -------------------------------------------------------
functions:
  # ── 서버 관련 ──────────────────
  createServer:
    handler: src/servers/createServer.handler
    events:
      - http:
          path: /servers
          method: post
          cors: true

  getServers:
    handler: src/servers/getServers.handler
    events:
      - http:
          path: /servers
          method: get
          cors: true

  getMyServers:
    handler: src/servers/getMyServers.handler
    events:
      - http:
          path: /servers/me
          method: get
          cors: true

  joinServer:
    handler: src/servers/joinServer.handler
    events:
      - http:
          path: /servers/{serverId}/join
          method: post
          cors: true

  getServerDetail:
    handler: src/servers/getServerDetail.handler
    events:
      - http:
          path: /servers/{serverId}
          method: get
          cors: true

  deleteServer:
    handler: src/servers/deleteServer.handler
    events:
      - http:
          path: /servers/{serverId}
          method: delete
          cors: true

  # ── 인증 관련 ────────────────────────
  userRegister:
    handler: src/auth/userRegister.handler
    events:
      - http:
          path: /userRegister
          method: post
          cors: true

  userLogin:
    handler: src/auth/userLogin.handler
    events:
      - http:
          path: /userLogin
          method: post
          cors: true

  userLogout:
    handler: src/auth/userLogout.handler
    events:
      - http:
          path: /userLogout
          method: delete
          cors: true

  tokenRefresh:
    handler: src/auth/tokenRefresh.handler
    events:
      - http:
          path: /token/refresh
          method: post
          cors: true

  # ── 채팅 관련 ────────────────────────
  getMessages:
    handler: src/chat/getMessages.handler
    events:
      - http:
          path: /servers/{serverId}/messages
          method: get
          cors: true

  # ── 채팅 WebSocket ───────────────────
  chatHandler:
    handler: src/chat/chatHandler.handler
    events:
      - websocket:
          route: $connect
      - websocket:
          route: $disconnect
      - websocket:
          route: createServer
      - websocket:
          route: joinServer
      - websocket:
          route: sendMessage

  # ── 채널 추가/삭제 ───────────────────
  addChannel:
    handler: src/servers/addChannel.handler
    events:
      - http:
          path: /servers/{serverId}/channels
          method: post
          cors: true

  deleteChannel:
    handler: src/servers/deleteChannel.handler
    events:
      - http:
          path: /servers/{serverId}/channels/{chId}
          method: delete
          cors: true

  # ── S3 Pre-signed URL 관련 ───────────────────
  getUploadUrl:
    handler: src/resources/getUploadUrl.handler
    events:
      - http:
          path: /resources/upload-url
          method: get
          cors: true

  saveFileMetadata:
    handler: src/resources/saveFileMetadata.handler
    events:
      - http:
          path: /servers/{serverId}/files
          method: post
          cors: true

  aiRouter:
    handler: src/ai/aiRouter.handler
    events:
      - http:
          path: /ai/analyze
          method: post
          cors: true

  saveLink:
    handler: src/resources/saveLink.handler
    events:
      - http:
          path: /servers/{serverId}/links
          method: post
          cors: true

# -------------------------------------------------------
# DynamoDB 테이블 정의 (CloudFormation)
# -------------------------------------------------------
resources:
  Resources:

    # 1. Users 테이블
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.usersTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: email-index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    # 2. Servers 테이블
    ServersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.serversTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: serverId
            AttributeType: S
          - AttributeName: status
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
        KeySchema:
          - AttributeName: serverId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: status-createdAt-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true

    # 3. Connections 테이블
    ConnectionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.connectionsTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: connectionId
            AttributeType: S
          - AttributeName: serverId
            AttributeType: S
        KeySchema:
          - AttributeName: connectionId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: serverId-index
            KeySchema:
              - AttributeName: serverId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true

    # 4. Messages 테이블
    MessagesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.messagesTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: serverId
            AttributeType: S
          - AttributeName: messageId
            AttributeType: S
        KeySchema:
          - AttributeName: serverId
            KeyType: HASH
          - AttributeName: messageId
            KeyType: RANGE

    # 5. RefreshTokens 테이블
    RefreshTokensTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.refreshTokensTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: refreshToken
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
          - AttributeName: refreshToken
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true

    # 6. ServerMembers 테이블
    ServerMembersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.serverMembersTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: serverId
            AttributeType: S
          - AttributeName: joinedAt
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
          - AttributeName: serverId
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: serverId-index
            KeySchema:
              - AttributeName: serverId
                KeyType: HASH
              - AttributeName: joinedAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
