service: smart-study-backend
frameworkVersion: "3"

plugins:
  - serverless-offline

custom:
  studentId: "inhatc-202647019"
  prefix: "smartstudy"
  usersTableName: "${self:custom.prefix}-Users"
  roomsTableName: "${self:custom.prefix}-Rooms"
  connectionsTableName: "${self:custom.prefix}-Connections"
  messagesTableName: "${self:custom.prefix}-Messages"
  refreshTokensTableName: "${self:custom.prefix}-RefreshTokens"

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  stage: dev
  role: arn:aws:iam::269578498605:role/SafeRole-inhatc-team3
  deploymentBucket:
    name: inhatc-team3-2-deployments

  environment:
    REGION: us-east-1
    # 암호화 관련

    # 로컬 환경을 위해 수정
    JWT_SECRET_KEY: "local-secret-key-for-dev"
    SALT: "local-salt-value"

    # 로컬 환경이 아닐 경우
    # JWT_SECRET_KEY:    ${ssm:/smartstudy/dev/jwt-secret-key}
    # SALT:              ${ssm:/smartstudy/dev/salt}
    HASHING_ALGORITHM: HS256
    S3_BUCKET: ${env:S3_BUCKET, ""}
    ALLOWED_ORIGIN: ${env:ALLOWED_ORIGIN, "https://your-cloudfront-domain.net"}
    RESOURCES_BUCKET: "inhatc-team3-2-resources"
    # 테이블명 환경변수 (핸들러에서 process.env.USERS_TABLE 등으로 참조)
    USERS_TABLE: ${self:custom.usersTableName}
    ROOMS_TABLE: ${self:custom.roomsTableName}
    CONNECTIONS_TABLE: ${self:custom.connectionsTableName}
    MESSAGES_TABLE: ${self:custom.messagesTableName}
    REFRESH_TOKENS_TABLE: ${self:custom.refreshTokensTableName}

  # ── IAM 최소 권한 (SafeRole) ──────────────────────────────
  # iamRoleStatements:
  #   # DynamoDB — smartstudy-* 테이블 및 GSI만 허용
  #   - Effect: Allow
  #     Action:
  #       - dynamodb:GetItem
  #       - dynamodb:Query
  #       - dynamodb:PutItem
  #       - dynamodb:UpdateItem
  #       - dynamodb:DeleteItem
  #       - dynamodb:DescribeTable
  #       - dynamodb:ListTables
  #       - dynamodb:UpdateTimeToLive
  #     Resource:
  #       - "arn:aws:dynamodb:us-east-1:*:table/smartstudy-*"
  #       - "arn:aws:dynamodb:us-east-1:*:table/smartstudy-*/index/*"

  #   # API Gateway WebSocket — ManageConnections (브로드캐스트용)
  #   - Effect: Allow
  #     Action:
  #       - execute-api:ManageConnections
  #     Resource:
  #       - "arn:aws:execute-api:us-east-1:*:*/@connections/*"

  #   # CloudWatch Logs — Lambda 실행 로그
  #   - Effect: Allow
  #     Action:
  #       - logs:CreateLogGroup
  #       - logs:CreateLogStream
  #       - logs:PutLogEvents
  #     Resource:
  #       - "arn:aws:logs:us-east-1:*:log-group:/aws/lambda/*"

  #   # SQS — 채팅 버퍼 큐 & AI 대기열 (SendMessage/ReceiveMessage만, DeleteMessage는 SafeRole에서 제외)
  #   - Effect: Allow
  #     Action:
  #       - sqs:SendMessage
  #       - sqs:ReceiveMessage
  #       - sqs:GetQueueAttributes
  #     Resource:
  #       - "arn:aws:sqs:us-east-1:*:smartstudy-*"

  #   # S3 — AI 처리 대상 파일 읽기 (inhatc-team3-2,3- prefix 버킷만)
  #   - Effect: Allow
  #     Action:
  #       - s3:GetObject
  #       - s3:ListBucket
  #     Resource:
  #       - "arn:aws:s3:::inhatc-team3-2-*"
  #       - "arn:aws:s3:::inhatc-team3-2-*/*"
  #       - "arn:aws:s3:::inhatc-team3-3-*"
  #       - "arn:aws:s3:::inhatc-team3-3-*/*"

  #   # Bedrock — Claude 모델 호출
  #   - Effect: Allow
  #     Action:
  #       - bedrock:InvokeModel
  #       - bedrock:GetFoundationModel
  #       - bedrock:ListFoundationModels
  #     Resource: "*"

  #   # Textract — 문서 텍스트 추출
  #   - Effect: Allow
  #     Action:
  #       - textract:StartDocumentTextDetection
  #       - textract:GetDocumentTextDetection
  #     Resource: "*"

  #   # Rekognition — 이미지 라벨/텍스트 감지
  #   - Effect: Allow
  #     Action:
  #       - rekognition:DetectLabels
  #       - rekognition:DetectText
  #     Resource: "*"

  #   # Translate — 다국어 번역
  #   - Effect: Allow
  #     Action:
  #       - translate:TranslateText
  #     Resource: "*"

  #   # Cognito — 사용자 조회 및 토큰 무효화
  #   - Effect: Allow
  #     Action:
  #       - cognito-idp:AdminGetUser
  #       - cognito-idp:ListUsers
  #       - cognito-idp:GlobalSignOut
  #       - cognito-idp:RevokeToken
  #     Resource:
  #       - "arn:aws:cognito-idp:us-east-1:*:userpool/smartstudy-*"

# -------------------------------------------------------
# Lambda 함수 목록
# -------------------------------------------------------
functions:
  # ── 방 관련 ──────────────────
  createRoom:
    handler: src/rooms/createRoom.handler
    events:
      - http:
          path: /rooms
          method: post
          cors: true

  getRooms:
    handler: src/rooms/getRooms.handler
    events:
      - http:
          path: /rooms
          method: get
          cors: true

  # 접속한 유저 소속 방 목록 조회
  getMyRooms:
    handler: src/rooms/getMyRooms.handler
    events:
      - http:
          path: /rooms/me
          method: get
          cors: true

  # 서버방 참여 시 참여 유저 정보 저장
  joinRoom:
    handler: src/rooms/joinRoom.handler
    events:
      - http:
          path: /rooms/{roomId}/join
          method: post
          cors: true

  getRoomDetail:
    handler: src/rooms/getRoomDetail.handler
    events:
      - http:
          path: /rooms/{roomId}
          method: get
          cors: true

  # ── 인증 관련 ────────────────────────
  userRegister:
    handler: src/auth/userRegister.handler
    events:
      - http:
          path: /userRegister
          method: post
          cors: true

  userLogin:
    handler: src/auth/userLogin.handler
    events:
      - http:
          path: /userLogin
          method: post
          cors: true

  userLogout:
    handler: src/auth/userLogout.handler
    events:
      - http:
          path: /userLogout
          method: delete
          cors: true

  tokenRefresh:
    handler: src/auth/tokenRefresh.handler
    events:
      - http:
          path: /token/refresh
          method: post
          cors: true

  # ── 채팅 관련 ────────────────────────
  getMessages:
    handler: src/chat/getMessages.handler
    events:
      - http:
          path: /rooms/{roomId}/messages
          method: get
          cors: true

  # ── 채팅 WebSocket ───────────────────
  chatHandler:
    handler: src/chat/chatHandler.handler
    events:
      - websocket:
          route: $connect
      - websocket:
          route: $disconnect
      - websocket:
          route: createRoom
      - websocket:
          route: joinRoom
      - websocket:
          route: sendMessage

  # ── 채널 추가/삭제 ───────────────────
  addChannel:
    handler: src/rooms/addChannel.handler
    events:
      - http:
          path: /rooms/{roomId}/channels
          method: post
          cors: true

  deleteChannel:
    handler: src/rooms/deleteChannel.handler
    events:
      - http:
          path: /rooms/{roomId}/channels/{chId}
          method: delete
          cors: true

  # ── S3 Pre-signed URL 관련 ───────────────────
  getUploadUrl:
    handler: src/resources/getUploadUrl.handler
    events:
      - http:
          path: /resources/upload-url
          method: get
          cors: true

  saveFileMetadata:
    handler: src/resources/saveFileMetadata.handler
    events:
      - http:
          path: /rooms/{roomId}/files
          method: post
          cors: true

  aiRouter:
    handler: src/ai/aiRouter.handler
    events:
      - http:
          path: /ai/analyze
          method: post
          cors: true

  saveLink:
    handler: src/resources/saveLink.handler
    events:
      - http:
          path: /rooms/{roomId}/links
          method: post
          cors: true

