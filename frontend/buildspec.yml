version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - cd frontend && npm install

  build:
    commands:
      - cd frontend
      - npm run build

  post_build:
    commands:
      # S3에 빌드 결과물 업로드
      - aws s3 sync build/ s3://$S3_BUCKET_FRONTEND --delete
      # CloudFront 캐시 무효화
      - aws cloudfront create-invalidation --distribution-id $CF_DISTRIBUTION_ID --paths "/*"