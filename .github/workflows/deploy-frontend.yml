name: Deploy Frontend

on:
  push:
    branches:
      - dev
    paths:
      - 'frontend/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 패키지 설치
        run: |
          cd frontend
          npm install

      - name: 빌드
        run: |
          cd frontend
          npm run build
        env:
          CI: false
          REACT_APP_API_HOST: ${{ secrets.REACT_APP_API_HOST }}
          REACT_APP_WS_HOST: ${{ secrets.REACT_APP_WS_HOST }}

      - name: AWS 자격증명 설정 (OIDC 방식)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::269578498605:role/service-role/github-actions-inhatc-shared
          aws-region: us-east-1

      - name: S3 동기화 (배포)
        run: |
          # S3 업로드까지만 진행 (CloudFront 무효화는 추후 권한 획득 시 추가)
          aws s3 sync frontend/build/ s3://inhatc-team3-1-frontend --delete
