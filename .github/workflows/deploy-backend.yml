name: Deploy Backend

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 패키지 설치
        run: |
          cd backend
          npm install

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Lambda 함수 배포
        run: |
          cd backend
          zip -r function.zip src package.json package-lock.json
          
          for func in createRoom getRooms userRegister userLogin userLogout tokenRefresh chatHandler; do
            echo "배포 중: smartstudy-dev-$func"
            aws lambda update-function-code \
              --function-name smartstudy-dev-$func \
              --zip-file fileb://function.zip \
              --region us-east-1
          done