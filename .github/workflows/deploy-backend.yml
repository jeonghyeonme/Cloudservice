name: Deploy Backend

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'

permissions:
  id-token: write # OIDC 인증을 위해 필수
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 패키지 설치
        run: |
          cd backend
          npm install

      - name: GitHub OIDC 진단 (교수님 확인용)
        run: |
          echo "==== GitHub이 AWS에 전달하는 인증 정보 ===="
          echo "레포지토리 경로 (sub): repo:${{ github.repository }}:*"
          echo "현재 브랜치 (ref): ${{ github.ref }}"
          echo "인증 대상 (aud): sts.amazonaws.com"
          echo "==========================================="

      - name: AWS 자격증명 설정 (OIDC 방식)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::269578498605:role/service-role/codepipeline-inhatc-shared
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Lambda 함수 배포
        run: |
          cd backend
          # 배포 스크립트 실행 (zip 생성 및 모든 함수 업데이트 수행)
          bash deploy.sh
